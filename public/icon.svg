<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B4DE0"/>
      <stop offset="60%" stop-color="#7B3FD4"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
    <linearGradient id="gridH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="gridV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <clipPath id="roundedBg">
      <rect width="120" height="120" rx="26" ry="26"/>
    </clipPath>
    <clipPath id="pickClip">
      <!-- Guitar pick: rounded top, point at bottom -->
      <path d="M60,14 C38,14 20,28 20,50 C20,67 30,76 60,97 C90,76 100,67 100,50 C100,28 82,14 60,14 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded square with gradient -->
  <rect width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Subtle inner glow/depth rings -->
  <rect width="120" height="120" rx="26" ry="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>

  <!-- Guitar pick shape - white -->
  <path d="M60,14 C38,14 20,28 20,50 C20,67 30,76 60,97 C90,76 100,67 100,50 C100,28 82,14 60,14 Z"
        fill="white" opacity="0.97"/>

  <!-- Chord grid — 5 columns x 4 rows, clipped inside the pick -->
  <g clip-path="url(#pickClip)">
    <!-- Vertical grid lines (left→right: pinkish to teal) -->
    <line x1="33" y1="28" x2="33" y2="80" stroke="#E91E8C" stroke-width="1.4" opacity="0.75"/>
    <line x1="44" y1="26" x2="44" y2="82" stroke="#D4278A" stroke-width="1.4" opacity="0.65"/>
    <line x1="55" y1="25" x2="55" y2="84" stroke="#A855CC" stroke-width="1.4" opacity="0.65"/>
    <line x1="66" y1="26" x2="66" y2="82" stroke="#5BC8D0" stroke-width="1.4" opacity="0.65"/>
    <line x1="77" y1="28" x2="77" y2="80" stroke="#26C6DA" stroke-width="1.4" opacity="0.65"/>

    <!-- Horizontal grid lines (top→bottom: pinkish to teal) -->
    <line x1="28" y1="38" x2="92" y2="38" stroke="#E91E8C" stroke-width="1.4" opacity="0.65"/>
    <line x1="26" y1="50" x2="94" y2="50" stroke="#C04AAA" stroke-width="1.4" opacity="0.60"/>
    <line x1="26" y1="62" x2="94" y2="62" stroke="#7B68CC" stroke-width="1.4" opacity="0.55"/>
    <line x1="28" y1="74" x2="92" y2="74" stroke="#26C6DA" stroke-width="1.4" opacity="0.45"/>

    <!-- Small dots at intersections -->
    <circle cx="44" cy="38" r="2.8" fill="#E91E8C"/>
    <circle cx="33" cy="50" r="2.8" fill="#E91E8C"/>
    <circle cx="55" cy="50" r="2.8" fill="#C04AAA"/>
    <circle cx="77" cy="50" r="2.8" fill="#5BC8D0"/>
    <circle cx="44" cy="62" r="2.8" fill="#A855CC"/>
    <circle cx="66" cy="62" r="2.8" fill="#5BC8D0"/>
    <circle cx="33" cy="74" r="2.8" fill="#7B68CC"/>
    <circle cx="44" cy="74" r="2.8" fill="#7B68CC"/>
    <circle cx="55" cy="74" r="2.8" fill="#7B68CC"/>
    <circle cx="66" cy="74" r="2.8" fill="#26C6DA"/>
    <circle cx="77" cy="74" r="2.8" fill="#26C6DA"/>

    <!-- Large orange circle (row 1, col 3) -->
    <circle cx="55" cy="38" r="9" fill="#FFC107"/>

    <!-- Small red dot (row 1, col 4) -->
    <circle cx="66" cy="38" r="4" fill="#F44336"/>

    <!-- Small teal dot (row 2, col 4) -->
    <circle cx="66" cy="50" r="3.2" fill="#26C6DA"/>

    <!-- Large pink/magenta circle (row 3, col 1) -->
    <circle cx="33" cy="62" r="10" fill="#E91E8C"/>
  </g>
</svg>
