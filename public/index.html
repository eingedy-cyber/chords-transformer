<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chords Transformer</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    h1 { font-size: 1.8rem; margin-bottom: 0.4rem; color: #1a1a1a; }

    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #333;
      font-size: 0.9rem;
    }

    .field { margin-bottom: 1.2rem; }

    input[type="text"], select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 1rem;
      transition: border-color 0.15s;
      background: white;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #1a6fa8;
      box-shadow: 0 0 0 3px rgba(26,111,168,0.12);
    }

    .hint { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }

    /* Key detection result */
    .detected-key {
      display: none;
      background: #f0faf0;
      border: 1px solid #b3e0b3;
      border-radius: 7px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .detected-key.visible { display: block; }

    .detected-key .song-meta {
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #1a1a1a;
      font-size: 1rem;
    }

    .detected-key .key-badge {
      display: inline-block;
      background: #1a6fa8;
      color: white;
      border-radius: 4px;
      padding: 0.1rem 0.5rem;
      font-weight: 700;
      font-family: monospace;
      font-size: 1rem;
    }

    /* Step 2: target key + button — hidden until key is detected */
    .step2 {
      display: none;
    }
    .step2.visible { display: block; }

    .row {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 1.2rem;
    }

    .row .field { flex: 1; margin-bottom: 0; }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #1a6fa8;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #155d8e; }
    button:active { background: #104c75; }
    button:disabled { background: #999; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .status.loading {
      display: block;
      background: #e8f4fd;
      color: #1a6fa8;
      border: 1px solid #b3d7f0;
    }

    .status.error {
      display: block;
      background: #fff3f3;
      color: #c0392b;
      border: 1px solid #f5a5a5;
    }

    .share-link {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      background: #f0faf0;
      border: 1px solid #b3e0b3;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
      word-break: break-all;
    }

    .share-link a { color: #1a6fa8; }

    .app-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.4rem;
    }

    .app-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .app-header h1 { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-header">
      <img src="/icon.svg" alt="Chords Transformer" class="app-icon">
      <h1>Chords Transformer</h1>
    </div>
    <p class="subtitle">Transpose any tab4u.com song to your preferred key</p>

    <!-- Step 1: URL input -->
    <div class="field">
      <label for="url">tab4u.com Song URL</label>
      <input
        type="text"
        id="url"
        placeholder="https://www.tab4u.com/..."
        autocomplete="off"
      >
      <p class="hint">Paste a song URL — the key will be detected automatically</p>
    </div>

    <!-- Detected key display -->
    <div class="detected-key" id="detectedKey">
      <div class="song-meta" id="songMeta"></div>
      <div>Original key: <span class="key-badge" id="originalKeyBadge"></span></div>
    </div>

    <!-- Step 2: target key + transpose -->
    <div class="step2" id="step2">
      <div class="row">
        <div class="field">
          <label for="key">Transpose to key</label>
          <select id="key"></select>
        </div>
      </div>

      <button id="transposeBtn">Transpose</button>
    </div>

    <div class="status" id="status"></div>
    <div class="share-link" id="shareLink"></div>
  </div>

  <script>
    const urlInput    = document.getElementById('url');
    const detectedKey = document.getElementById('detectedKey');
    const songMeta    = document.getElementById('songMeta');
    const originalKeyBadge = document.getElementById('originalKeyBadge');
    const step2       = document.getElementById('step2');
    const keySelect   = document.getElementById('key');
    const transposeBtn = document.getElementById('transposeBtn');
    const statusEl    = document.getElementById('status');
    const shareLinkEl = document.getElementById('shareLink');

    const MAJOR_KEYS = ['C','C#','Db','D','D#','Eb','E','F','F#','Gb','G','G#','Ab','A','A#','Bb','B'];
    const MINOR_KEYS = ['Am','A#m','Bbm','Bm','Cm','C#m','Dbm','Dm','D#m','Ebm','Em','Fm','F#m','Gbm','Gm','G#m','Abm'];

    function isMinorKey(key) {
      return key && key.endsWith('m');
    }

    function populateKeyDropdown(originalKey) {
      const keys = isMinorKey(originalKey) ? MINOR_KEYS : MAJOR_KEYS;
      keySelect.innerHTML = keys.map(k => `<option>${k}</option>`).join('');
      // Pre-select the original key if it's in the list
      const opt = [...keySelect.options].find(o => o.value === originalKey);
      if (opt) keySelect.value = originalKey;
    }

    let detectedOriginalKey = null;
    let detectController = null;

    // Auto-detect key when URL is pasted or typed (debounced)
    let detectTimer = null;
    urlInput.addEventListener('input', () => {
      clearTimeout(detectTimer);
      const url = urlInput.value.trim();
      if (!url.startsWith('http')) {
        resetStep2();
        return;
      }
      detectTimer = setTimeout(() => detectKey(url), 600);
    });

    async function detectKey(url) {
      // Cancel any in-flight request
      if (detectController) detectController.abort();
      detectController = new AbortController();

      resetStep2();
      showStatus('loading', 'Detecting key…');

      try {
        const res = await fetch('/detect-key', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
          signal: detectController.signal
        });

        const data = await res.json();

        if (!res.ok) {
          showStatus('error', data.error || 'Could not detect key');
          return;
        }

        hideStatus();
        detectedOriginalKey = data.originalKey;

        // Show song info
        const parts = [data.title, data.artist].filter(Boolean);
        songMeta.textContent = parts.join(' — ');
        originalKeyBadge.textContent = data.originalKey || '?';
        detectedKey.classList.add('visible');

        // Populate dropdown with only major or minor keys, pre-selected to original
        populateKeyDropdown(data.originalKey);

        step2.classList.add('visible');
        shareLinkEl.style.display = 'none';

      } catch (err) {
        if (err.name === 'AbortError') return;
        showStatus('error', 'Network error: ' + err.message);
      }
    }

    transposeBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      const targetKey = keySelect.value;
      if (!url) return;

      transposeBtn.disabled = true;
      showStatus('loading', 'Transposing…');
      shareLinkEl.style.display = 'none';

      try {
        const res = await fetch('/transpose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, targetKey })
        });

        const html = await res.text();

        if (!res.ok) {
          showStatus('error', 'Error: ' + (extractError(html) || res.statusText));
          return;
        }

        hideStatus();

        const blob = new Blob([html], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');

        const shareUrl = `/song?url=${encodeURIComponent(url)}&key=${encodeURIComponent(targetKey)}`;
        shareLinkEl.style.display = 'block';
        shareLinkEl.innerHTML = `Shareable link: <a href="${shareUrl}" target="_blank">${location.origin}${shareUrl}</a>`;

      } catch (err) {
        showStatus('error', 'Network error: ' + err.message);
      } finally {
        transposeBtn.disabled = false;
      }
    });

    function resetStep2() {
      detectedKey.classList.remove('visible');
      step2.classList.remove('visible');
      shareLinkEl.style.display = 'none';
      detectedOriginalKey = null;
    }

    function showStatus(type, msg) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }

    function hideStatus() {
      statusEl.className = 'status';
      statusEl.style.display = 'none';
    }

    function extractError(html) {
      const m = html.match(/<p>(.*?)<\/p>/);
      return m ? m[1] : null;
    }
  </script>
</body>
</html>
